<!DOCTYPE html>
<html>
<head>
    <title>Employee Management System</title>
    <link rel="stylesheet" href="emp.css">
</head>
<body>

    <div class="container">

        <h1>Employee Management System</h1>

        <div class="stats">
            <div class="stat-card">
                <span class="stat-number" id="totalCount">0</span>
                <span class="stat-label">Total Employees</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="avgSalary">₹0</span>
                <span class="stat-label">Average Salary</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="deptCount">0</span>
                <span class="stat-label">Departments</span>
            </div>
        </div>

        <div class="form-section">
            <div class="form-group">
                <label for="empName">Name</label>
                <input type="text" id="empName" placeholder="Enter name">
                <span class="error-msg" id="nameError"></span>
            </div>
            <div class="form-group">
                <label for="empAge">Age</label>
                <input type="number" id="empAge" placeholder="Enter age">
                <span class="error-msg" id="ageError"></span>
            </div>
            <div class="form-group">
                <label for="empDepartment">Department</label>
                <select id="empDepartment">
                    <option value="">Select Department</option>
                    <option>HR</option>
                    <option>IT</option>
                    <option>Finance</option>
                    <option>Marketing</option>
                    <option>Operations</option>
                </select>
                <span class="error-msg" id="deptError"></span>
            </div>
            <div class="form-group">
                <label for="empSalary">Salary</label>
                <input type="number" id="empSalary" placeholder="Enter salary">
                <span class="error-msg" id="salaryError"></span>
            </div>
            <div class="form-group">
                <label>&nbsp;</label>
                <button onclick="addEmployee()">Add Employee</button>
            </div>
        </div>

        <div class="toolbar">
            <div class="search-box">
                <span class="search-icon">&#128269;</span>
                <input
                    type="text"
                    id="search"
                    placeholder="Search by name, department, ID..."
                    onkeyup="searchEmployee()"
                >
            </div>
            <button class="export-btn" onclick="exportCSV()">Export CSV</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th onclick="sortTable('id')" class="sortable">ID <span class="sort-icon" id="sort-id"></span></th>
                        <th onclick="sortTable('name')" class="sortable">Name <span class="sort-icon" id="sort-name"></span></th>
                        <th onclick="sortTable('age')" class="sortable">Age <span class="sort-icon" id="sort-age"></span></th>
                        <th onclick="sortTable('department')" class="sortable">Department <span class="sort-icon" id="sort-department"></span></th>
                        <th onclick="sortTable('salary')" class="sortable">Salary <span class="sort-icon" id="sort-salary"></span></th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="employeeTable">
                </tbody>
            </table>
        </div>

    </div>

    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h3>Confirm Delete</h3>
            <p id="modalText">Are you sure you want to delete this employee?</p>
            <div class="modal-actions">
                <button class="modal-cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-confirm" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="emp.js"></script>

</body>
</html>
